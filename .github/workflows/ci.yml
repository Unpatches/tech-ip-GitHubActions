name: CI

# Запускаем на каждый push и на pull request в основную ветку.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Права для GITHUB_TOKEN: читать репозиторий и писать пакеты (push в GHCR).
permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — тесты и сборка Go-кода.
  # ---------------------------------------------------------------------------
  test:
    name: Test & build (go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Версия берётся из go.mod (go 1.25.0) — без дублирования.
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        # -race ловит гонки, -count=1 отключает кеш тестов (реальный прогон).
        run: go test -race -count=1 ./...

      - name: go build
        # Собираем все пакеты модуля (оба сервиса auth и tasks входят сюда).
        run: go build ./...

  # ---------------------------------------------------------------------------
  # Job 2 — сборка Docker-образов обоих сервисов и push в GHCR.
  # Запускается только после успешного job `test`.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build & push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Собираем оба сервиса параллельно одним и тем же набором шагов.
      matrix:
        service: [auth, tasks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Встроенный токен — отдельный секрет для GHCR не нужен.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/techip-${{ matrix.service }}
          # Стратегия версионирования образа:
          #   - короткий hash коммита (например sha-1a2b3c4) — точная версия;
          #   - latest — только для основной ветки.
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          # На pull_request образ только собираем (push требует прав, которых у
          # PR из форков нет). На push в ветку — публикуем в registry.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Кеш слоёв между прогонами CI.
          cache-from: type=gha
          cache-to: type=gha,mode=max
