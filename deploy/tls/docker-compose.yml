services:
  db:
    image: postgres:16-alpine
    container_name: tasks_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_DB: tasks
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../../services/tasks/migrations/001_tasks.sql:/docker-entrypoint-initdb.d/001_tasks.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d tasks"]
      interval: 2s
      timeout: 2s
      retries: 20

  tasks:
    build:
      context: ../..
      dockerfile: deploy/tls/tasks.Dockerfile
    container_name: tasks_app
    restart: unless-stopped
    environment:
      TASKS_PORT: "8082"
      AUTH_GRPC_ADDR: "host.docker.internal:50051"
      TASKS_DB_DSN: "postgres://tasks:tasks@db:5432/tasks?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    container_name: tasks_nginx
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      - tasks
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
